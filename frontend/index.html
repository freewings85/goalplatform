<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GoalPlatform · 目标与计划管理</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e5e8ee;
    --side:#0f172a; --side-ink:#cbd5e1; --side-active:#1e293b;
    --primary:#4f46e5; --primary-weak:#eef2ff;
    --ok:#16a34a; --ok-weak:#e9f7ef; --bad:#dc2626; --bad-weak:#fdecec;
    --warn:#d97706; --warn-weak:#fdf2e3; --info:#0ea5e9;
    --radius:12px; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .sidebar{width:236px;background:var(--side);color:var(--side-ink);display:flex;flex-direction:column;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#22d3ee);display:grid;place-items:center;color:#fff;font-weight:800}
  .brand b{color:#fff;font-size:15px;letter-spacing:.3px}
  .brand small{display:block;color:#64748b;font-size:11px;font-weight:500}
  .nav{padding:8px}
  .nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;color:var(--side-ink);text-decoration:none;border-radius:8px;font-size:13.5px;cursor:pointer;margin:2px 0}
  .nav a:hover{background:#1a2436;color:#fff}
  .nav a.active{background:var(--side-active);color:#fff}
  .nav .sec{color:#475569;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:14px 12px 4px}
  .nav a.backglobal{color:#93c5fd;font-size:12.5px;margin-bottom:2px}
  .nav a.backglobal:hover{color:#fff}
  .syspick{margin:2px 8px 8px;padding:9px 12px;background:#1e293b;border-radius:8px;color:#94a3b8;font-size:11px}
  .syspick b{color:#fff;font-size:13.5px;display:block;margin-top:2px}
  .side-foot{margin-top:auto;padding:14px 16px;border-top:1px solid #1e293b;font-size:12px;color:#64748b}
  /* main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:5}
  .crumb{font-weight:600;font-size:15px}
  .crumb span{color:var(--muted);font-weight:500}
  .cyclepick{margin-left:auto;display:flex;align-items:center;gap:8px}
  .cyclepick select{width:auto;padding:7px 10px}
  .avatar{width:32px;height:32px;border-radius:50%;background:#4f46e5;color:#fff;display:grid;place-items:center;font-size:13px;font-weight:600}
  .content{padding:22px 26px;max-width:1180px;width:100%}
  .content.wide{max-width:none}
  h2.page{font-size:20px;margin:0 0 2px}
  .sub{color:var(--muted);margin:0 0 18px}
  /* cards */
  .grid{display:grid;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:16px 18px}
  .section-title{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px}
  .section-title h3{margin:0;font-size:15px}
  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;text-decoration:none}
  .btn:hover{background:#f8fafc}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
  .btn.primary:hover{background:#4338ca}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{color:var(--bad);border-color:#f3d4d4}
  .btn.danger:hover{background:var(--bad-weak)}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:12px;padding:11px 14px;border-bottom:1px solid var(--line);background:#fbfcfe}
  td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr.click{cursor:pointer}
  tr.click:hover td{background:#f8fafc}
  .tbl-wrap{overflow:hidden;border-radius:var(--radius);border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}
  /* pills / badges */
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
  .pill.ok{background:var(--ok-weak);color:var(--ok)}
  .pill.bad{background:var(--bad-weak);color:var(--bad)}
  .pill.warn{background:var(--warn-weak);color:var(--warn)}
  .pill.run{background:#fef9c3;color:#a16207}
  .pill.neutral{background:#eef2f7;color:#475569}
  .tag{display:inline-block;padding:1px 8px;border-radius:6px;background:#eef2f7;color:#475569;font-size:11.5px;margin-right:4px}
  .tag.cyc{background:#e0f2fe;color:#0369a1}
  .muted{color:var(--muted)} .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
  .hdot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
  .hdot.ok{background:var(--ok)} .hdot.warn{background:var(--warn)} .hdot.bad{background:var(--bad)}
  /* goal tree */
  .tree{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .grow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .grow:last-child{border-bottom:none}
  .grow:hover{background:#f8fafc}
  .chev{width:24px;height:24px;line-height:24px;text-align:center;color:var(--muted);font-size:16px;flex-shrink:0;cursor:pointer;user-select:none;border-radius:6px;transition:background .1s}
  .chev:hover{background:#e2e8f0;color:var(--ink)}
  .chev.col{transform:rotate(-90deg)}
  .chev.leaf{visibility:hidden}
  .gmain{flex:1;min-width:0;cursor:pointer}
  .gtitle{font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .gtitle .lv{font-size:10.5px;font-weight:700;color:var(--primary);background:var(--primary-weak);padding:1px 6px;border-radius:5px}
  .gtitle .lv.sub{color:#0369a1;background:#e0f2fe}
  .gmeta{color:var(--muted);font-size:12px;margin-top:3px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .rowbtns{display:flex;gap:6px;flex-shrink:0}
  .krbox{padding:2px 14px 12px 42px;background:#fbfcfe;border-bottom:1px solid var(--line)}
  .kr{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px dashed #eef2f7}
  .kr:last-child{border-bottom:none}
  .kr .knm{flex:1;font-size:12.5px}
  .kr .kval{font-size:12px;color:var(--muted)}
  .kr .kval b{color:var(--ink)}
  /* 交付阶段流水线（固定 5 阶段步进器） */
  .pipe{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 8px}
  .step{display:flex;align-items:center;gap:8px;padding:7px 12px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;background:#fff;color:var(--muted)}
  .step .n{width:19px;height:19px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;background:#eef2f7;color:var(--muted);flex-shrink:0}
  .step.done{background:var(--ok-weak);border-color:#bbe6cd;color:#15803d}
  .step.done .n{background:var(--ok);color:#fff}
  .step.run{background:#fef9c3;border-color:#fde68a;color:#a16207}
  .step.run .n{background:var(--warn);color:#fff}
  .step.blocked{background:var(--bad-weak);border-color:#f6c9c9;color:#991b1b}
  .step.blocked .n{background:var(--bad);color:#fff}
  .arr{color:#cbd5e1;align-self:center;font-size:12px}
  .board .pipe{margin:6px 0 0}
  .board .step{padding:5px 9px;font-size:11.5px}
  .board .step .n{width:16px;height:16px;font-size:10px}
  /* misc */
  .row-flex{display:flex;gap:16px;flex-wrap:wrap}.row-flex>*{flex:1;min-width:280px}
  .note{background:#f1f5ff;border:1px solid #dbe4ff;color:#3949ab;border-radius:10px;padding:10px 13px;font-size:12.5px;margin:2px 0 14px}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .kv{display:grid;grid-template-columns:112px 1fr;gap:8px 14px;font-size:13px}
  .kv .k{color:var(--muted)}
  .filterbar{display:flex;gap:8px;align-items:center;margin:14px 0 12px;flex-wrap:wrap}
  .chip{padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12.5px;cursor:pointer}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .spacer{flex:1}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:50}
  .modal.open{display:flex}
  .dialog{background:#fff;border-radius:16px;width:680px;max-width:94vw;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .dialog-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .dialog-h b{font-size:16px}
  .x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;background:none;border:none}
  .dialog-b{padding:18px 22px}
  .dialog-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
  select,input[type=text],input[type=number],input[type=date]{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;font-family:inherit}
  textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;min-height:60px;resize:vertical;background:#fff;font-family:inherit}
  .segmented{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex-wrap:wrap}
  .segmented .seg{padding:7px 12px;font-size:12.5px;background:#fff;border:none;border-right:1px solid var(--line);cursor:pointer;color:var(--muted)}
  .segmented .seg:last-child{border-right:none}
  .segmented .seg.active{background:var(--primary);color:#fff}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .toast{position:fixed;right:20px;bottom:20px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transform:translateY(8px);transition:.2s;z-index:60}
  .toast.show{opacity:1;transform:none}
  .toast.err{background:var(--bad)}
  /* ===== 工作台：目标树 + 甘特时间线（行对齐） ===== */
  .ws-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 12px}
  .ws-head select{width:auto;padding:7px 10px}
  .legend{display:flex;gap:16px;align-items:center;font-size:12px;color:var(--muted);margin:0 0 10px;flex-wrap:wrap}
  .legend .lg{display:inline-flex;align-items:center;gap:6px}
  .legend .sw{width:16px;height:10px;border-radius:3px;display:inline-block}
  .legend .sw.today{width:2px;height:14px;background:var(--primary);opacity:.7;border-radius:0}
  .gantt{border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow)}
  .gscroll{overflow-x:auto;position:relative}
  .grow2{display:flex;align-items:stretch;border-bottom:1px solid var(--line);min-height:42px}
  .grow2:last-child{border-bottom:none}
  .grow2:hover .gleft{background:#f8fafc}
  .grow2.sel .gleft{background:var(--primary-weak)}
  .gleft{position:sticky;left:0;z-index:2;width:330px;min-width:330px;background:#fff;border-right:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:6px 10px}
  .gleft .gt{flex:1;min-width:0}
  .gleft .gt b{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
  .gleft .gt .gt-meta{color:var(--muted);font-size:11.5px;margin-top:2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .gleft .rbtns{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:.1s}
  .grow2:hover .rbtns{opacity:1}
  .glane{position:relative;flex:1;min-width:360px}
  .gaxis{position:sticky;top:0;z-index:4;background:#fbfcfe}
  .gaxis .gleft{background:#fbfcfe;font-weight:600;font-size:12px;color:var(--muted)}
  .gaxis .glane{height:42px}
  .wknd{position:absolute;top:0;bottom:0;background:#eef2f7;z-index:0}       /* 周末浅底 */
  .gridline{position:absolute;top:0;bottom:0;width:1px;background:#e9edf3;z-index:0}   /* 周一细线 */
  .mgrid{position:absolute;top:0;bottom:0;width:1px;background:#d4dce6;z-index:0}      /* 月初分隔 */
  .gmlabel{position:absolute;top:3px;font-size:11.5px;font-weight:600;color:var(--ink);white-space:nowrap;padding-left:5px}
  .wklabel{position:absolute;top:23px;font-size:9.5px;color:var(--muted);white-space:nowrap;padding-left:2px}
  .today{position:absolute;top:0;bottom:0;width:2px;background:var(--primary);opacity:.6;z-index:1}
  .todayflag{position:absolute;top:2px;transform:translateX(-50%);background:var(--primary);color:#fff;font-size:9.5px;font-weight:600;padding:1px 5px;border-radius:5px;z-index:3;white-space:nowrap}
  .gtrack{position:absolute;height:6px;top:calc(50% - 3px);border-radius:3px;background:#e2e8f0;z-index:1}
  .gseg{position:absolute;height:15px;top:calc(50% - 7.5px);border-radius:4px;z-index:2;cursor:pointer;box-shadow:0 0 0 2px #fff}
  .gseg:hover{filter:brightness(1.06);outline:2px solid rgba(79,70,229,.5)}
  .gseg.done{background:var(--ok)} .gseg.running{background:var(--warn)} .gseg.todo{background:#cbd5e1}
  .gseg.overdue{box-shadow:0 0 0 2px #fff,0 0 0 3.5px var(--bad)}   /* 逾期未完成：红框提醒 */
  .gtip{position:fixed;z-index:70;background:var(--ink);color:#fff;font-size:12px;padding:6px 9px;border-radius:7px;pointer-events:none;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.3);display:none}
  .noplan{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11.5px;color:#cbd5e1}
  /* 目标弹窗里的 5 阶段编辑卡 */
  .secard{border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:9px;background:#fbfcfe}
  .secard .se-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .secard .se-head>b{font-size:13.5px}
  /* 起止时间与标题同行、稍小 */
  .se-dates{display:inline-flex;align-items:center;gap:6px}
  .se-dates input[type=date]{width:auto;padding:4px 7px;font-size:11.5px;color:var(--ink)}
  .se-tilde{color:var(--muted);font-size:11px}
  .secard .se-status{margin-top:8px}
  .secard .se-status .segmented{margin-top:0}
  /* 产出物：可编辑的 名称+链接 多条列表 */
  .se-deliv{margin-top:9px}
  .se-deliv-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
  .se-deliv-lb{font-size:12px;color:var(--muted);font-weight:600}
  .dl-list{display:flex;flex-direction:column;gap:6px}
  .dl-row{display:flex;align-items:center;gap:6px}
  .dl-row .dl-name{flex:0 0 34%;padding:6px 8px;font-size:12px}
  .dl-row .dl-url{flex:1;padding:6px 8px;font-size:12px}
  .dl-open{flex:0 0 auto;width:26px;height:26px;display:grid;place-items:center;border:1px solid var(--line);border-radius:7px;color:var(--primary);text-decoration:none;font-size:13px}
  .dl-open.off{color:#cbd5e1;pointer-events:none}
  .dl-del{flex:0 0 auto;width:26px;height:26px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--muted);cursor:pointer;font-size:12px;line-height:1}
  .dl-del:hover{color:var(--bad);border-color:#f6c9c9}
  [hidden]{display:none!important}
</style>
</head>
<body>
<!-- 登录门：未用 Jira 登录时挡在最前 -->
<div id="gate" style="display:none;position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#0f172a,#1e293b);color:#e2e8f0;align-items:center;justify-content:center">
  <div style="width:420px;max-width:92vw;background:#fff;color:var(--ink);border-radius:16px;padding:30px 28px;box-shadow:0 20px 60px rgba(0,0,0,.4)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#22d3ee);display:grid;place-items:center;color:#fff;font-weight:800">G</div>
      <div><b style="font-size:17px">GoalPlatform</b><div class="muted" style="font-size:12px">目标与计划管理</div></div>
    </div>
    <p class="muted" style="font-size:13px;margin:14px 0 16px">用你的 <b>Jira 账号</b>登录即可使用。目标同步、关联、文档都直接落在 Jira。</p>
    <div class="field"><label>Jira 用户名</label><input id="li_user" type="text" autocomplete="username" placeholder="如 chenzifei"/></div>
    <div class="field"><label>密码</label><input id="li_pass" type="password" autocomplete="current-password" placeholder="Jira 登录密码"/></div>
    <button class="btn primary" data-act="doLogin" style="width:100%;justify-content:center;font-size:14px;padding:11px">🔓 登录 Jira</button>
    <div id="gateWarn" class="note" style="margin-top:14px;display:none">⚠ 尚未配置 Jira 站点地址。</div>
    <div class="muted" style="font-size:11.5px;margin-top:12px;text-align:center">站点：<span id="gateSite">—</span></div>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">G</div>
      <div><b>GoalPlatform</b><small>目标与计划管理</small></div>
    </div>
    <nav class="nav" id="nav-main">
      <div class="sec">管理</div>
      <a data-nav="lines">🗂️ 业务线</a>
      <a data-nav="cycles">🗓️ 周期</a>
      <div class="sec">平台</div>
      <a data-nav="settings">👥 用户 / 集成</a>
    </nav>
    <div class="side-foot">进业务线看目标计划<br/>执行 · 文档 · 附件都在 Jira</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="crumb" id="crumb">业务线</div>
      <span style="flex:1"></span>
      <span id="meBox" style="display:flex;align-items:center;gap:8px"></span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- 通用模态 -->
<div class="modal" id="modal">
  <div class="dialog">
    <div class="dialog-h"><b id="mTitle"></b><button class="x" data-act="closeModal">×</button></div>
    <div class="dialog-b" id="mBody"></div>
    <div class="dialog-f" id="mFoot"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="gtip" id="gtip"></div>

<script>
const API='/api';
const STAGE_STATUS=[['todo','neutral','⚪ 未开始'],['running','run','🟡 进行中'],['done','done','✅ 已完成']];
const SMAP=Object.fromEntries(STAGE_STATUS.map(s=>[s[0],s]));
// 固定 5 阶段（名称 + 产出物），与后端一致，仅用于新建目标时展示
const FIXED_STAGES=[['业务需求确定','业务流程图 + 建模图'],['方案确定','方案 spec'],['开发完成','测试 spec'],['测试','测试报告'],['发布上线','上线（release note）']];

const state={view:'lines',lineId:null,line:null,cycleId:null,
  lines:[],cycles:[],goals:[],byId:{},roots:[],expanded:new Set(),
  users:[],me:null,jira:null};
function currentUser(){return state.me;}

// ---------- helpers ----------
async function api(path,{method='GET',body}={}){
  const opt={method,headers:{},credentials:'same-origin'};
  if(body!==undefined){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify(body);}
  const res=await fetch(API+path,opt);
  if(res.status===204)return null;
  const data=await res.json().catch(()=>null);
  if(!res.ok)throw new Error((data&&data.detail)||('HTTP '+res.status));

// ---------- 工作台：目标树 + 甘特时间线 ----------
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseISO(s){const p=String(s).split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function addDays(isoStr,n){const d=parseISO(isoStr);d.setDate(d.getDate()+n);return iso(d);}
function computeRange(goals,avail){
  const ds=[];const cyc=state.cycles.find(c=>c.id===state.cycleId);
  if(cyc){cyc.start_date&&ds.push(cyc.start_date);cyc.end_date&&ds.push(cyc.end_date);}
  goals.forEach(g=>{g.start_date&&ds.push(g.start_date);g.end_date&&ds.push(g.end_date);
    (g.stages||[]).forEach(s=>{s.start_date&&ds.push(s.start_date);s.end_date&&ds.push(s.end_date);});});
  const tISO=iso(new Date());ds.push(tISO);ds.sort();
  const lo=parseISO(ds[0]),hi=parseISO(ds[ds.length-1]);
  const md=new Date(lo.getFullYear(),lo.getMonth(),1);
  const xd=new Date(hi.getFullYear(),hi.getMonth()+1,0);
  const minMs=md.getTime(),maxMs=xd.getTime();
  const days=Math.max(1,Math.round((maxMs-minMs)/86400000)+1);   // 含首尾，按天
  // 适配宽度：整段尽量铺满可见区，一屏看全（~90 天也不横向滚动）；每天 6~20px
  let pxPerDay=Math.max(6,Math.min(20,(avail||900)/days));
  const width=Math.round(days*pxPerDay);
  return {minMs,maxMs,days,pxPerDay,width,tISO};
}
function xOf(isoStr,r){const t=parseISO(isoStr).getTime();return Math.max(0,Math.min(r.width,(t-r.minMs)/86400000*r.pxPerDay));}
// 每行背景：周末浅底 + 周一细线 + 月初分隔 + 今天线（读到天）
function laneCal(r){
  let h='';let cur=new Date(r.minMs);
  while(cur.getTime()<=r.maxMs){
    const wd=cur.getDay();
    if(wd===0||wd===6){const x=xOf(iso(cur),r);h+=`<div class="wknd" style="left:${x}px;width:${Math.min(r.width,x+r.pxPerDay)-x}px"></div>`;}
    if(wd===1&&cur.getTime()>r.minMs)h+=`<div class="gridline" style="left:${xOf(iso(cur),r)}px"></div>`;
    cur.setDate(cur.getDate()+1);
  }
  let m=new Date(new Date(r.minMs).getFullYear(),new Date(r.minMs).getMonth()+1,1);
  while(m.getTime()<=r.maxMs){h+=`<div class="mgrid" style="left:${xOf(iso(m),r)}px"></div>`;m.setMonth(m.getMonth()+1);}
  h+=`<div class="today" style="left:${xOf(r.tISO,r)}px"></div>`;return h;
}
// 顶部日历轴：月份名（上） + 每周一的日期 M/D（下） + 今天旗标
function calAxis(r){
  let h='';let md=new Date(new Date(r.minMs).getFullYear(),new Date(r.minMs).getMonth(),1);
  while(md.getTime()<=r.maxMs){const yl=md.getMonth()===0?md.getFullYear()+' ':'';
    h+=`<div class="gmlabel" style="left:${Math.max(0,xOf(iso(md),r))}px">${yl}${md.getMonth()+1}月</div>`;md.setMonth(md.getMonth()+1);}
  let wd=new Date(r.minMs);
  while(wd.getTime()<=r.maxMs){if(wd.getDay()===1)h+=`<div class="wklabel" style="left:${xOf(iso(wd),r)}px">${wd.getMonth()+1}/${wd.getDate()}</div>`;wd.setDate(wd.getDate()+1);}
  h+=`<div class="todayflag" style="left:${xOf(r.tISO,r)}px">今天 ${new Date().getMonth()+1}/${new Date().getDate()}</div>`;
  return h;
}
function stageSpans(g){
  const out=[];const hasWin=g.start_date&&g.end_date;
  let winStart,winDays;
  if(hasWin){winStart=parseISO(g.start_date);winDays=Math.max(5,Math.round((parseISO(g.end_date)-winStart)/86400000));}
  (g.stages||[]).slice().sort((a,b)=>a.stage_index-b.stage_index).forEach((st,i)=>{
    let s=st.start_date,e=st.end_date;
    if((!s||!e)&&hasWin){const per=winDays/5;
      s=iso(new Date(winStart.getTime()+Math.round(i*per)*86400000));
      e=iso(new Date(winStart.getTime()+Math.max(1,Math.round((i+1)*per)-1)*86400000));}
    if(s&&e)out.push({id:st.id,idx:st.stage_index,name:st.name,status:st.status,s,e});
  });
  return out;
}
function laneBars(g,r){
  let h='';
  if(g.start_date&&g.end_date){const a=xOf(g.start_date,r),b=xOf(g.end_date,r);h+=`<div class="gtrack" style="left:${a}px;width:${Math.max(2,b-a)}px"></div>`;}
  const segs=stageSpans(g);
  if(!segs.length)return h+`<div class="noplan">未排期（编辑目标设起止）</div>`;
  segs.forEach(sg=>{const a=xOf(sg.s,r),b=xOf(sg.e,r),w=Math.max(5,b-a);const cls=sg.status==='running'?'running':sg.status;
    const od=sg.e<r.tISO&&sg.status!=='done';   // 截止已过且未完成 → 逾期提醒
    h+=`<div class="gseg ${cls}${od?' overdue':''}" style="left:${a}px;width:${w}px" data-act="editStage" data-id="${sg.id}" data-s="${sg.s}" data-e="${sg.e}" data-tip="${esc((sg.idx+1)+'. '+sg.name+' · '+SMAP[sg.status][2]+' · '+sg.s+' ~ '+sg.e+(od?' · ⚠ 逾期未完成':''))}"></div>`;});
  return h;
}
function visibleGoals(){
  const out=[];
  (function walk(list,depth){list.forEach(g=>{out.push({g,depth});if(state.expanded.has(g.id))walk(childrenOf(g.id),depth+1);});})(state.roots,0);
  return out;
}

    : `<button class="btn sm" data-act="jiraSync" data-id="${g.id}" title="在 Jira 建 issue" style="padding:2px 7px">⤴ Jira</button>`;
  const left=`<div class="gleft" style="padding-left:${10+depth*18}px">

}

function segHTML(id,options,current){
  return `<div class="segmented" id="${id}">`+options.map(o=>`<button type="button" class="seg ${o[0]===current?'active':''}" data-seg="${o[0]}" onclick="pickSeg(this)">${o[2]}</button>`).join('')+`</div>`;

function segVal(id){const a=document.querySelector('#'+id+' .seg.active');return a?a.dataset.seg:null;}
// 上一阶段结束 = 下一阶段开始：设完某阶段结束，自动带出下一阶段开始，省得从头选
function stageChainStart(i){
  const end=document.getElementById('s'+i+'_end'),next=document.getElementById('s'+(i+1)+'_start');
  if(end&&next&&end.value)next.value=end.value;
}
// 选好开始后：结束不能早于开始；结束还空着就默认成开始那天，
// 这样打开结束的日期卡片时定位在开始日，而不是跳到当天。
function syncEndDefault(fromId,toId){
  const f=document.getElementById(fromId),t=document.getElementById(toId);
  if(!f||!t||!f.value)return;
  t.min=f.value;
  if(!t.value||t.value<f.value)t.value=f.value;
}
// 产出物：每条 = 名称 + 链接（可编辑、可增删、填了链接即可点↗跳转）
function delivRowHTML(name,url){
  return `<div class="dl-row">
    <input class="dl-name" placeholder="名称，如 README.md" value="${esc(name||'')}"/>
    <input class="dl-url" placeholder="http://…/secure/attachment/…/README.md" value="${esc(url||'')}" oninput="delivSyncOpen(this)"/>
    <a class="dl-open${url?'':' off'}" ${url?`href="${esc(url)}"`:''} target="_blank" rel="noopener" title="打开链接">↗</a>
    <button type="button" class="dl-del" title="删除这条" onclick="this.closest('.dl-row').remove()">✕</button>
  </div>`;
}
function delivSyncOpen(inp){const a=inp.parentNode.querySelector('.dl-open');const v=inp.value.trim();if(!a)return;if(v){a.setAttribute('href',v);a.classList.remove('off');}else{a.removeAttribute('href');a.classList.add('off');}}
function addDeliv(boxId){const box=document.getElementById(boxId);if(box)box.insertAdjacentHTML('beforeend',delivRowHTML('',''));}
function collectDeliv(boxId){const box=document.getElementById(boxId);if(!box)return[];
  return [...box.querySelectorAll('.dl-row')].map(r=>({name:r.querySelector('.dl-name').value.trim(),url:r.querySelector('.dl-url').value.trim()})).filter(d=>d.name||d.url);}

// goal create / edit
function stageEditorHTML(goal){
  const stages=goal?goal.stages.slice().sort((a,b)=>a.stage_index-b.stage_index)
    :FIXED_STAGES.map((s,i)=>({stage_index:i,name:s[0],deliverable:s[1],status:'todo',start_date:'',end_date:'',deliverables:[]}));
  const rows=stages.map((s,i)=>{
    const dl=s.deliverables||[];
    const dlRows=dl.map(d=>delivRowHTML(d.name,d.url)).join('');
    return `
    <div class="secard">
      <div class="se-head">
        <b>${i+1}. ${esc(s.name)}</b>
        <span class="se-dates">
          <input id="s${i}_start" type="date" value="${s.start_date||''}" onchange="syncEndDefault('s${i}_start','s${i}_end')"/>
          <span class="se-tilde">~</span>
          <input id="s${i}_end" type="date" value="${s.end_date||''}" onchange="stageChainStart(${i})"/>
        </span>
      </div>
      <div class="se-status">${segHTML('s'+i+'_status',STAGE_STATUS,s.status||'todo')}</div>
      <div class="se-deliv">
        <div class="se-deliv-top"><span class="se-deliv-lb">产出物（名称 + 链接）</span><button type="button" class="btn sm" onclick="addDeliv('deliv${i}')">＋ 添加</button></div>
        <div id="deliv${i}" class="dl-list">${dlRows}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="section-title" style="margin:16px 0 8px"><h3 style="font-size:14px">交付 5 阶段（名称固定 · 排期 / 状态 / 产出物链接）</h3></div>
    ${rows}`;
}
function goalForm(goal,parentId){
  const cycleOpts=state.cycles.map(c=>`<option value="${c.id}" ${((goal?goal.cycle_id:state.cycleId)===c.id)?'selected':''}>${esc(c.name)}</option>`).join('');
  const parentGoals=state.goals.filter(g=>!goal||g.id!==goal.id);
  const curParent=goal?goal.parent_id:(parentId?Number(parentId):null);
  const parentOpts=`<option value="">无（顶层大目标）</option>`+parentGoals.map(g=>`<option value="${g.id}" ${curParent===g.id?'selected':''}>${esc(g.title)}</option>`).join('');
  const ownerOpts=`<option value="">（未指定）</option>`+state.users.map(u=>`<option value="${u.id}" ${((goal&&goal.owner_user_id)===u.id)?'selected':''}>${esc(u.name)}</option>`).join('');
  return `
    <div class="field"><label>目标标题</label><input id="g_title" type="text" value="${goal?esc(goal.title):''}" placeholder="如：把报价 Agent 做成可规模化交付的标品"/></div>
    <div class="two">
      <div class="field"><label>负责人</label><select id="g_owner_user">${ownerOpts}</select></div>
      <div class="field"><label>周期</label><select id="g_cycle">${cycleOpts}</select></div>
    </div>
    <div class="field"><label>父目标（决定它在树里的位置）</label><select id="g_parent">${parentOpts}</select></div>
    <div class="two">
      <div class="field"><label>目标开始</label><input id="g_start" type="date" value="${goal&&goal.start_date?goal.start_date:''}" onchange="syncEndDefault('g_start','g_end')"/></div>
      <div class="field"><label>目标结束</label><input id="g_end" type="date" value="${goal&&goal.end_date?goal.end_date:''}"/></div>
    </div>
    ${goal?'':`<div class="field"><label>Jira</label><label style="font-weight:400;display:flex;align-items:center;gap:8px;color:var(--ink);cursor:pointer"><input type="checkbox" id="g_sync" checked style="width:auto"/> 建目标后同步到 Jira（在该业务线项目下建 issue）</label></div>`}
    ${stageEditorHTML(goal)}`;
}
function openGoalForm(goal,parentId){
  const sortedStages=goal?goal.stages.slice().sort((a,b)=>a.stage_index-b.stage_index):null;
  openModal(goal?'编辑目标':'新建目标',goalForm(goal,parentId));
  modalSave.handler=async()=>{
    const title=val('g_title');if(!title)return toast('标题不能填空',true);
    const ouid=val('g_owner_user')?Number(val('g_owner_user')):null;
    const oname=ouid?((state.users.find(u=>u.id===ouid)||{}).name||''):'';
    const body={title,owner:oname,owner_user_id:ouid,
      cycle_id:Number(val('g_cycle'))||null,parent_id:val('g_parent')?Number(val('g_parent')):null,
      start_date:val('g_start')||null,end_date:val('g_end')||null};
    const stageVals=[0,1,2,3,4].map(i=>({status:segVal('s'+i+'_status'),start_date:val('s'+i+'_start')||null,end_date:val('s'+i+'_end')||null,deliverables:collectDeliv('deliv'+i)}));
    if(goal){
      await api('/goals/'+goal.id,{method:'PATCH',body});
      for(let i=0;i<sortedStages.length&&i<5;i++)await api('/stages/'+sortedStages[i].id,{method:'PATCH',body:stageVals[i]});
      toast('已更新目标与阶段');
    }else{
      body.business_line_id=state.lineId;body.stages=stageVals;
      const sync=document.getElementById('g_sync');body.sync_to_jira=sync?sync.checked:false;
      const res=await api('/goals',{method:'POST',body});
      if(body.parent_id)state.expanded.add(body.parent_id);  // 建子目标后自动展开父
      if(res&&res.jira_error)toast('目标已建，但同步 Jira 失败：'+res.jira_error,true);
      else if(res&&res.jira_key)toast('已创建并同步 Jira：'+res.jira_key);
      else toast('已创建目标（含 5 阶段）');
    }
    await loadGoals();render();closeModal();
  };
}

      <div class="se-deliv-top"><label style="margin:0">产出物（名称 + 链接）</label><button type="button" class="btn sm" onclick="addDeliv('st_deliv')">＋ 添加</button></div>

// ================= action dispatch =================
const modalSave={handler:null};
const actions={
  closeModal, go:v=>go(v), selectLine:id=>selectLine(id),
  modalSave:async()=>{try{if(modalSave.handler)await modalSave.handler();}catch(e){toast(e.message,true);}},
  editLine:id=>openLineForm(state.lines.find(l=>l.id===Number(id))),
  newLine:()=>openLineForm(null),
  delLine:async id=>{if(!confirm('删除该业务线？（其下若还有目标会被拦截）'))return;try{await api('/business-lines/'+id,{method:'DELETE'});toast('已删除');await loadGlobal();render();}catch(e){toast(e.message,true);}},
  newCycle:()=>openCycleForm(null),
  editCycle:id=>openCycleForm(state.cycles.find(c=>c.id===Number(id))),
  delCycle:async id=>{if(!confirm('删除该周期？（其下若还有目标会被拦截）'))return;try{await api('/cycles/'+id,{method:'DELETE'});toast('已删除');if(state.cycleId===Number(id))state.cycleId=null;await loadGlobal();if(state.view==='workspace')await loadGoals();render();}catch(e){toast(e.message,true);}},
  toggle:id=>{const n=Number(id);if(state.expanded.has(n))state.expanded.delete(n);else state.expanded.add(n);render();},
  toggleAll:id=>{if(id==='expand')expandAll();else state.expanded=new Set();render();},
  newGoal:()=>openGoalForm(null,null),
  addChild:id=>openGoalForm(null,id),
  editGoal:id=>openGoalForm(state.byId[Number(id)],null),
  delGoal:async id=>{const g=state.byId[Number(id)];const kids=childrenOf(Number(id));
    if(!confirm(`删除「${g.title}」？`+(kids.length?`\n注意：它有 ${kids.length} 个子目标，会一并删除。`:'')))return;
    try{await api('/goals/'+id,{method:'DELETE'});toast('已删除');await loadGoals();render();}catch(e){toast(e.message,true);}},
  editStage:id=>{const sid=Number(id);let st=null;for(const g of state.goals){const f=(g.stages||[]).find(s=>s.id===sid);if(f){st=f;break;}}if(st)openStageForm(st);},
  // Jira 关联
  jiraSync:async id=>{try{await api('/goals/'+id+'/jira/sync',{method:'POST'});toast('已同步到 Jira');await loadGoals();render();}catch(e){toast(e.message,true);}},
  jiraLink:id=>{openModal('关联已有 Jira issue',`<div class="field"><label>Jira issue key</label><input id="jl_key" type="text" placeholder="QUOTE-1203"/></div><div class="hint" style="font-size:12px;color:var(--muted)">会用当前用户的凭据校验该 issue 是否存在。</div>`);
    modalSave.handler=async()=>{const k=val('jl_key');if(!k)return toast('填一个 key',true);await api('/goals/'+id+'/jira/link',{method:'POST',body:{key:k}});toast('已关联 '+k);await loadGoals();render();closeModal();};},
  jiraUnlink:async id=>{if(!confirm('解除与 Jira 的关联？（只清平台侧，不动 Jira 里的 issue）'))return;try{await api('/goals/'+id+'/jira/link',{method:'DELETE'});toast('已解除');await loadGoals();render();}catch(e){toast(e.message,true);}},
  // 用户 / 集成 / 登录
  delUser:async id=>{if(!confirm('删除该用户？其负责的目标会被置为「未指定」。'))return;try{await api('/users/'+id,{method:'DELETE'});toast('已删除');await loadGlobal();render();}catch(e){toast(e.message,true);}},
  saveJira:async()=>{try{const body={base_url:val('jira_base'),issue_type:val('jira_itype')};await api('/settings/jira',{method:'PUT',body});toast('已保存 Jira 站点');await loadGlobal();render();}catch(e){toast(e.message,true);}},
  doLogin:async()=>{const u=val('li_user');const p=(document.getElementById('li_pass')||{}).value||'';if(!u||!p)return toast('请输入 Jira 用户名和密码',true);try{await api('/auth/login',{method:'POST',body:{username:u,password:p}});location.href='/';}catch(e){toast(e.message,true);}},
  logout:async()=>{try{await api('/auth/logout',{method:'POST'});}catch(e){}location.href='/';},
};

document.body.addEventListener('click',e=>{
  if(gSuppressClick){gSuppressClick=false;e.preventDefault();e.stopPropagation();return;} // 刚拖动过，吞掉这次 click
  const el=e.target.closest('[data-act]');if(!el)return;
  const fn=actions[el.dataset.act];if(fn){e.preventDefault();fn(el.dataset.id,el,e);}
});
// ===== 甘特：悬浮提示 + 拖动改期 / 拖两端改起止 =====
let _gtip,gdrag=null,gSuppressClick=false;
function gtipShow(text,x,y){_gtip=_gtip||document.getElementById('gtip');_gtip.textContent=text;_gtip.style.display='block';_gtip.style.left=(x+14)+'px';_gtip.style.top=(y+16)+'px';}
function gtipHide(){_gtip=_gtip||document.getElementById('gtip');if(_gtip.style.display==='block')_gtip.style.display='none';}
function segEdge(seg,clientX){const rc=seg.getBoundingClientRect();const zone=Math.min(9,rc.width*0.28);const off=clientX-rc.left;if(off<=zone)return 'l';if(off>=rc.width-zone)return 'r';return 'move';}
function findStage(id){for(const g of state.goals){const f=(g.stages||[]).find(x=>x.id===id);if(f)return f;}return null;}
document.body.addEventListener('mousedown',e=>{
  gSuppressClick=false; // 新交互开始：清掉上次「拖远了没触发 click」遗留的抑制标志
  const seg=e.target.closest&&e.target.closest('.gseg[data-s]');
  if(!seg||!state.gr)return;
  e.preventDefault(); // 防止拖动时选中文字
  gdrag={id:Number(seg.dataset.id),mode:segEdge(seg,e.clientX),startX:e.clientX,
    s0:seg.dataset.s,e0:seg.dataset.e,el:seg,moved:false,ns:seg.dataset.s,ne:seg.dataset.e};
});
document.body.addEventListener('mousemove',e=>{
  if(gdrag){
    const r=state.gr,dd=Math.round((e.clientX-gdrag.startX)/r.pxPerDay);
    if(dd!==0)gdrag.moved=true;
    let s=gdrag.s0,en=gdrag.e0;
    if(gdrag.mode==='move'){s=addDays(gdrag.s0,dd);en=addDays(gdrag.e0,dd);}
    else if(gdrag.mode==='l'){s=addDays(gdrag.s0,dd);if(s>gdrag.e0)s=gdrag.e0;}
    else{en=addDays(gdrag.e0,dd);if(en<gdrag.s0)en=gdrag.s0;}
    gdrag.ns=s;gdrag.ne=en;
    const a=xOf(s,r),b=xOf(en,r);gdrag.el.style.left=a+'px';gdrag.el.style.width=Math.max(5,b-a)+'px';
    gtipShow((gdrag.mode==='move'?'移动到 ':'调整为 ')+s+' ~ '+en,e.clientX,e.clientY);
    return;
  }
  const seg=e.target.closest&&e.target.closest('.gseg[data-tip]');
  if(seg){seg.style.cursor=segEdge(seg,e.clientX)==='move'?'grab':'ew-resize';gtipShow(seg.dataset.tip,e.clientX,e.clientY);}
  else gtipHide();
});
document.body.addEventListener('mouseup',async()=>{
  if(!gdrag)return;
  const d=gdrag;gdrag=null;gtipHide();
  if(!d.moved||(d.ns===d.s0&&d.ne===d.e0))return; // 没动 = 点击 → 交给 click 打开编辑
  gSuppressClick=true; // 拖过：抑制随后的 click，避免弹出编辑框
  const st=findStage(d.id);if(st){st.start_date=d.ns;st.end_date=d.ne;} // 本地先改，立即反馈
  render();
  try{await api('/stages/'+d.id,{method:'PATCH',body:{start_date:d.ns,end_date:d.ne}});toast('已调整排期 '+d.ns+' ~ '+d.ne);}
  catch(err){toast('保存失败：'+err.message,true);await loadGoals();render();}
});
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

// ================= login gate + boot =================
function showGate(st){
  document.querySelector('.app').style.display='none';
  document.getElementById('gate').style.display='flex';
  document.getElementById('gateWarn').style.display=st.configured?'none':'block';
  const site=document.getElementById('gateSite');if(site)site.textContent=st.jira_base_url||'（未配置）';
  const pw=document.getElementById('li_pass');
  if(pw&&!pw._wired){pw._wired=1;pw.addEventListener('keydown',e=>{if(e.key==='Enter')actions.doLogin();});}
}
function hideGate(){document.getElementById('gate').style.display='none';document.querySelector('.app').style.display='flex';}
async function boot(){
  let st;
  try{st=await api('/auth/status');}
  catch(e){document.body.innerHTML='<div style="padding:40px;font-family:sans-serif">后端未启动？ '+esc(e.message)+'</div>';return;}
  if(!st.logged_in){showGate(st);return;}
  state.me=st.user;hideGate();
  try{await loadGlobal();if(state.view==='workspace')await loadGoals();render();}
  catch(e){document.getElementById('content').innerHTML=`<div class="empty">加载失败：${esc(e.message)}</div>`;}
}
boot();
</script>
